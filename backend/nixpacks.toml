# Force Python and Curl to install directly via Nix packages during the setup phase
[phases.setup]
nixPkgs = ["python3", "curl"]
cmds = ["curl -fsSL https://raw.githubusercontent.com/xdevplatform/xurl/main/install.sh | bash"]

# Tell Nixpacks to permanently inject these paths into the global container profile
[phases.install]
paths = ["/usr/local/bin", "/opt/venv/bin"]