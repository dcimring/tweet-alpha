# Force Python, Node.js, and Curl to install directly via Nix packages during the setup phase
[phases.setup]
nixPkgs = ["python3", "curl", "nodejs"]
cmds = ["curl -fsSL https://raw.githubusercontent.com/xdevplatform/xurl/main/install.sh | bash", "npm install -g pm2"]

# Tell Nixpacks to permanently inject these paths into the global container profile
[phases.install]
paths = ["/usr/local/bin", "/opt/venv/bin"]